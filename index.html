<!DOCTYPE html>
<html lang="pl">
<head>
    <title>Kalendarz Akademicki Politechniki Łódzkiej</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="11-resources/01-css/style.css" class="css-light">
    <link rel="stylesheet" href="01-pages/00-00-index/01-css/calendar.css" class="css-light">
    <link rel="stylesheet" href="11-resources/01-css/styleDark.css" class="css-dark">
    <link rel="stylesheet" href="01-pages/00-00-index/01-css/calendarDark.css" class="css-dark">
    <link rel="stylesheet" href="11-resources/01-css/styleContrast.css" class="css-contrast">
    <link rel="stylesheet" href="01-pages/00-00-index/01-css/calendarContrast.css" class="css-contrast">
    <link rel="icon" href="11-resources/02-image/Favico.jpg">
    <!-- Kolejność ważna: db → auth → index → editor -->
    <script src="11-resources/05-js/mobile-detect.js"></script>
    <script src="11-resources/05-js/stylesheet-change.js"></script>
    <script src="01-pages/00-00-index/05-js/db.js"></script>
    <script src="01-pages/00-00-index/05-js/auth.js"></script>
    <script src="01-pages/00-00-index/05-js/index.js"></script>
    <script src="01-pages/00-00-index/05-js/editor.js"></script>
    <script src="01-pages/00-00-index/05-js/legend-color.js"></script>
</head>
<body>
    <header class="app-header">
        <span class="lang-indicator">[PL]</span>
        <div class="header-filters">
            <span class="filters-label">Filtry:</span>
            <button class="tab-btn tab-btn--active" id="tab-calendar">Kalendarz</button>
            <button class="tab-btn" id="tab-events">Wydarzenia</button>
            <button class="tab-btn" id="tab-edit" hidden>Edytuj</button>
        </div>
        <div class="header-actions">
            <button class="btn-login" id="css-button">Dark</button>
            <span class="editor-badge" id="editor-badge" hidden>REDAKTOR</span>
            <button class="btn-login" id="login-button">login</button>
        </div>
    </header>

    <main>
        <div class="calendar-wrapper">
            <nav class="month-nav">
                <button class="btn-nav" id="prev-month-button">&#8592;</button>
                <p id="current-date-paragraph"></p>
                <button class="btn-nav" id="next-month-button">&#8594;</button>
            </nav>

            <section id="calendar">
                <!-- Siatka kalendarza -->
                <section id="calendar-main">
                    <table>
                        <thead></thead>
                        <tbody></tbody>
                    </table>
                </section>

                <!-- Legenda (widok widza) -->
                <section id="calendar-legend">
                    <button class="btn-legend" id="legend-button">Filtry</button>
                    <section class="legend-section">
                        <h3 class="legend-title">LEGENDA</h3>
                        <div class="legend-item">
                            <span class="legend-dot legend-dot--rektorskie"></span>godziny rektorskie
                        </div>
                        <div class="legend-item">
                            <span class="legend-dot legend-dot--dziekanskie"></span>godziny dziekańskie
                        </div>
                        <div class="legend-item">
                            <span class="legend-dot legend-dot--egzamin"></span>egzamin
                        </div>
                        <div class="legend-item">
                            <span class="legend-dot legend-dot--kolokwium"></span>kolokwium
                        </div>
                        <div class="legend-item">
                            <span class="legend-dot legend-dot--imprezy"></span>imprezy studenckie
                        </div>
                        <div class="legend-item">
                            <span class="legend-dot legend-dot--inne"></span>inne ciekawe wydarzenia
                        </div>
                    </section>
                    <section class="legend-section" hidden>
                        <h3 class="legend-title">FILTERS</h3>
                        <!-- Rok -->
                        <!-- Kierunek -->
                        <!-- Grupa -->
                        <!-- Obieralny 1 -->
                        <!-- Obieralny 2 -->

                    </section>
                </section>

                <!-- Kolor Picker (widok widza) -->
                <section id="calendar-color" class="editor-panel" hidden>
                    <h3 class="color-title">COLOR</h3>
                    <div class="legend-item">
                        <label class="legend-dot legend-dot--color" for="color-input"></label>
                        <input type="color" class="color-input" id="color-input" value="#000000"><br>
                        <button class="btn-color" id="color-confirm">Zatwierdź</button>
                        <button id="color-exit">Wyjdź</button>
                    </div>
                </section>

                <!-- Panel redaktora (tryb Edytuj) — domyślnie ukryty -->
                <aside id="editor-panel" class="editor-panel" hidden>
                    <div class="editor-panel__title" id="editor-date-title">Wybierz datę ↑</div>

                    <ul class="event-list" id="event-list"></ul>

                    <form class="event-form" id="event-form" hidden novalidate>
                        <!-- Krok 1: siatka kategorii -->
                        <div class="form-kat-grid" id="form-kat-grid">
                            <button type="button" class="form-kat-btn form-kat-btn--rektorskie" data-kat="rektorskie">godziny rektorskie</button>
                            <button type="button" class="form-kat-btn form-kat-btn--dziekanskie" data-kat="dziekanskie">godziny dziekańskie</button>
                            <button type="button" class="form-kat-btn form-kat-btn--egzamin" data-kat="egzamin">egzamin</button>
                            <button type="button" class="form-kat-btn form-kat-btn--kolokwium" data-kat="kolokwium">kolokwium</button>
                            <button type="button" class="form-kat-btn form-kat-btn--imprezy" data-kat="imprezy">imprezy studenckie</button>
                            <button type="button" class="form-kat-btn form-kat-btn--inne" data-kat="inne">inne ciekawe wydarzenia</button>
                        </div>
                        <!-- Krok 2: banner wybranej kategorii -->
                        <div class="form-kat-banner" id="form-kat-banner" hidden></div>
                        <!-- Pola wspólne -->
                        <label class="event-form__label">dnia
                            <input type="date" class="event-form__input" id="form-data" required>
                        </label>
                        <label class="event-form__label">w godzinach
                            <div class="event-form__time-row">
                                <input type="time" class="event-form__input" id="form-czas-od">
                                <span>–</span>
                                <input type="time" class="event-form__input" id="form-czas-do">
                            </div>
                        </label>
                        <label class="event-form__label" id="form-skrot-label" hidden>skrót
                            <input type="text" class="event-form__input" id="form-skrot"
                                   placeholder="np. AM2, Juwenalia..." required>
                        </label>
                        <!-- Pola tylko dla egzaminu / kolokwium -->
                        <div id="form-exam-fields" hidden>
                            <label class="event-form__label">grupa
                                <input type="text" class="event-form__input" id="form-grupa" placeholder="np. I1">
                            </label>
                            <label class="event-form__label">Przedmiot
                                <input type="text" class="event-form__input" id="form-przedmiot" placeholder="pełna nazwa">
                            </label>
                            <label class="event-form__label">sala
                                <input type="text" class="event-form__input" id="form-sala" placeholder="np. C2.WEIA">
                            </label>
                        </div>
                        <label class="event-form__label">szczegóły
                            <textarea class="event-form__textarea" id="form-szczegoly"
                                      placeholder="dodatkowe informacje..."></textarea>
                        </label>
                        <div class="event-form-buttons">
                            <button type="submit" class="btn-confirm" id="btn-confirm">ZATWIERDŹ</button>
                            <button type="button" class="btn-odrzuc" id="btn-odrzuc">ODRZUĆ</button>
                        </div>
                    </form>
                </aside>
            </section>
        </div>
    </main>

    <footer class="mobile-footer">
        <button class="footer-tab footer-tab--active">Kalendarz &#9660;</button>
        <button class="footer-tab">Pogoda</button>
        <button class="footer-tab">Legenda</button>
    </footer>

    <!-- Dymek informacyjny (macOS-style popover) -->
    <div id="event-popover" class="event-popover" hidden>
        <div class="popover-header" id="popover-header"></div>
        <div class="popover-body">
            <div class="popover-main"     id="popover-main"></div>
            <div class="popover-time"     id="popover-time"     hidden></div>
            <div class="popover-group"    id="popover-group"    hidden></div>
            <div class="popover-location" id="popover-location" hidden></div>
            <div class="popover-details"  id="popover-details"  hidden></div>
            <!-- Przyciski akcji — widoczne tylko dla redaktora -->
            <div class="popover-actions" id="popover-actions" hidden>
                <button class="btn-popover-edit"   id="btn-popover-edit">Edytuj</button>
                <button class="btn-popover-cancel" id="btn-popover-cancel">Odwołaj</button>
            </div>
        </div>
    </div>

    <script>
        let currentColor = null;
        document.addEventListener("DOMContentLoaded", function ()
        {
            start();
            colorRead();
            document.querySelectorAll(".legend-dot").forEach(function(element) {
                element.addEventListener("click", function () {
                    console.log(element.classList[1]);
                    currentColor = element.classList[1];
                    openPicker();
                });
            });
            disableStylesheet(document.getElementsByClassName("css-dark")[0]);
            disableStylesheet(document.getElementsByClassName("css-dark")[1]);
            disableStylesheet(document.getElementsByClassName("css-contrast")[0]);
            disableStylesheet(document.getElementsByClassName("css-contrast")[1]);
        });

        // -- Color Picker --
        document.getElementById("color-exit").addEventListener("click", function () {
            currentColor = null;
            closePicker();
        })
        document.getElementById("color-confirm").addEventListener("click", function () {
            colorEdit(currentColor);
            colorSet(currentColor, document.getElementById("color-input").value);
            currentColor = null;
            closePicker();
        });
        document.addEventListener("calendarRendered", function() {
            console.log("calendarRendered");
            colorRead();
        });

        // -- CSS Change --
        document.getElementById("css-button").addEventListener("click", function () {
            if (document.getElementById("css-button").innerText === "Dark") {
                enableStylesheet(document.getElementsByClassName("css-dark")[0]);
                enableStylesheet(document.getElementsByClassName("css-dark")[1]);
                disableStylesheet(document.getElementsByClassName("css-light")[0]);
                disableStylesheet(document.getElementsByClassName("css-light")[1]);
                document.getElementById("css-button").innerText = "Contrast";
            } else if (document.getElementById("css-button").innerText === "Contrast") {
                enableStylesheet(document.getElementsByClassName("css-contrast")[0]);
                enableStylesheet(document.getElementsByClassName("css-contrast")[1]);
                disableStylesheet(document.getElementsByClassName("css-dark")[0]);
                disableStylesheet(document.getElementsByClassName("css-dark")[1]);
                document.getElementById("css-button").innerText = "Light";
            } else {
                enableStylesheet(document.getElementsByClassName("css-light")[0]);
                enableStylesheet(document.getElementsByClassName("css-light")[1]);
                disableStylesheet(document.getElementsByClassName("css-contrast")[0]);
                disableStylesheet(document.getElementsByClassName("css-contrast")[1]);
                document.getElementById("css-button").innerText = "Dark";
            }
        });

        // -- Legend Filters Change --
        document.getElementById("legend-button").addEventListener("click", function (){
            if (document.getElementById("legend-button").innerText === "Filtry") {
                document.getElementById("legend-button").innerText = "Legenda";
            } else {
                document.getElementById("legend-button").innerText = "Filtry";
            }
            document.getElementsByClassName("legend-section")[0].classList.toggle("hidden");
            document.getElementsByClassName("legend-section")[1].classList.toggle("hidden");
        });

        document.getElementById("login-button").addEventListener("click", function () {
            if (!Auth.isLoggedIn()) {
                window.location = "00-01-login.html";
            }
        });
        document.getElementById("next-month-button").addEventListener("click", function () {
            nextMonth();
        });
        document.getElementById("prev-month-button").addEventListener("click", function () {
            prevMonth();
        });
        document.getElementById("legend-button").addEventListener("click", function (event) {
            console.log("legend event");
            if (document.getElementsByClassName("legend-title")[0].innerText === "LEGENDA") {
                // Filters
                document.getElementsByClassName("legend-title")[0].innerText = "FILTRY";
                document.getElementById("legend-button").innerText = "LEGENDA";
            } else {
                // Legend
                document.getElementsByClassName("legend-title")[0].innerText = "LEGENDA";
                document.getElementById("legend-button").innerText = "FILTRY";
            }
            document.getElementsByClassName("legend-section")[0].toggleAttribute("hidden");
            document.getElementsByClassName("legend-section")[1].toggleAttribute("hidden");
        })
    </script>
</body>
</html>
